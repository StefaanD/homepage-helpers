name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

  release:
    types:
      - published

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: stefaand/homepage-helpers

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/stefaand/homepage-helpers
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/stefaand/homepage-helpers:latest
          labels: ${{ steps.meta.outputs.labels }}